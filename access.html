<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Tesla OAuth — Authorization Code</title>
<style>
  :root {
    --bg: #0f1113; --card: #191c1f; --line: #2a2f34;
    --ink: #e8eaed; --muted: #9aa0a6; --accent: #4ea1ff;
    --ok: #35c46b; --bad: #ff5c5c; --codebg: #0b0d0f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 560px; background: var(--card);
    border: 1px solid var(--line); border-radius: 14px; padding: 28px 28px 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,.35);
  }
  h1 { font-size: 17px; margin: 0 0 2px; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  .label { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 18px 0 6px; }
  .code {
    display: block; background: var(--codebg); border: 1px solid var(--line); border-radius: 9px;
    padding: 12px 14px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px; word-break: break-all; color: var(--ink); user-select: all;
  }
  .row { display: flex; gap: 10px; align-items: flex-start; }
  .row .code { flex: 1; }
  button {
    flex: 0 0 auto; cursor: pointer; border: 1px solid var(--line); background: #23272b; color: var(--ink);
    border-radius: 9px; padding: 12px 14px; font-size: 13px; font-weight: 600; transition: background .12s;
  }
  button:hover { background: #2c3136; }
  button.copied { color: var(--ok); border-color: var(--ok); }
  .pill { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
  .pill.ok { background: rgba(53,196,107,.14); color: var(--ok); }
  .pill.bad { background: rgba(255,92,92,.14); color: var(--bad); }
  .note {
    margin-top: 22px; padding: 12px 14px; background: rgba(78,161,255,.07);
    border: 1px solid rgba(78,161,255,.25); border-radius: 9px; font-size: 12.5px; color: var(--muted);
  }
  .note strong { color: var(--ink); }
  .err { color: var(--bad); }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background: #000; padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }
  a { color: var(--accent); }
</style>
</head>
<body>
  <main class="card" id="card" aria-live="polite"></main>
<script>
  (function () {
    var p = new URLSearchParams(window.location.search);
    var code = p.get("code");
    var state = p.get("state");
    var error = p.get("error");
    var errorDesc = p.get("error_description");
    var card = document.getElementById("card");

    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }
    function h(html) { card.innerHTML = html; }

    if (error) {
      h(
        '<h1>Authorization failed <span class="pill bad">error</span></h1>' +
        '<p class="sub">Tesla returned an error instead of an authorization code.</p>' +
        '<div class="label">error</div><div class="code err">' + esc(error) + '</div>' +
        (errorDesc ? '<div class="label">description</div><div class="code">' + esc(errorDesc) + '</div>' : '') +
        '<div class="note">Start the authorization flow again. If it keeps failing, re-check the app’s ' +
        '<strong>Allowed Redirect URI</strong> in the Tesla developer portal (must be ' +
        '<code>https://srp.kuju.email/access</code>).</div>'
      );
      return;
    }

    if (code) {
      h(
        '<h1>Authorization code captured <span class="pill ok">ok</span></h1>' +
        '<p class="sub">Copy this code and exchange it for tokens from a trusted environment.</p>' +
        '<div class="label">authorization code</div>' +
        '<div class="row"><span class="code" id="code">' + esc(code) + '</span>' +
        '<button id="copy" type="button">Copy</button></div>' +
        (state ? '<div class="label">state</div><div class="code">' + esc(state) +
          '</div><p class="sub" style="margin-top:6px">Confirm this matches the <code>state</code> you sent (CSRF check).</p>' : '') +
        '<div class="note"><strong>This code is short-lived and secret.</strong> Exchange it for an access/refresh token ' +
        'yourself using your <strong>client secret</strong> — never here. This page is public and static; it holds no ' +
        'secrets and does not transmit the code anywhere (read it straight from the URL). Don’t share the code.</div>'
      );
      var btn = document.getElementById("copy");
      btn.addEventListener("click", function () {
        var done = function () { btn.textContent = "Copied ✓"; btn.classList.add("copied"); setTimeout(function () { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1600); };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(code).then(done, function () { selectCode(); });
        } else { selectCode(); }
      });
      function selectCode() {
        var el = document.getElementById("code"), r = document.createRange();
        r.selectNodeContents(el); var s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
      }
      return;
    }

    h(
      '<h1>Tesla OAuth callback</h1>' +
      '<p class="sub">This is the redirect landing page for the Tesla Fleet API app.</p>' +
      '<div class="note">Nothing to show — open this page by completing the Tesla authorization flow, which sends you ' +
      'here with a <code>?code=…</code> parameter. The public key this app registers is served at ' +
      '<code>/.well-known/appspecific/com.tesla.3p.public-key.pem</code>.</div>'
    );
  })();
</script>
</body>
</html>
